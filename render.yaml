services:
  - type: web
    name: jarvis-commerceos-staging-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jarvis-commerceos-staging-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_MINUTES
        value: "1440"
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

  - type: web
    name: jarvis-commerceos-staging-web
    runtime: docker
    plan: free
    region: singapore
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /sourcing
    autoDeployTrigger: checksPass
    envVars:
      - key: BACKEND_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: jarvis-commerceos-staging-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: NEXT_PUBLIC_API_BASE
        value: /api/backend

databases:
  - name: jarvis-commerceos-staging-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: jarvis
    user: jarvis
    ipAllowList: []
